<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>요청 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">

    <h1 class="mb-3">요청 상세</h1>

    <div class="card mb-3">
        <div class="card-header">요청 정보</div>

        <div class="card-body">
            <p class="mb-2">번호: <span th:text="${request.id}"></span></p>
            <p class="mb-2">제목: <span th:text="${request.title}"></span></p>
            <p class="mb-2">내용: <span th:text="${request.content}"></span></p>
            <p class="mb-2">작성자: <span th:text="${request.writer}"></span></p>
            <p class="mb-2">상태: <span th:text="${request.status}"></span></p>
            <p class="mb-0">등록일: <span th:text="${request.createdAt}"></span></p>
        </div>
    </div>

    <div class="mb-3">
        <a th:href="@{/requests/{id}/edit(id=${request.id})}" class="btn btn-primary">수정하기</a>
    </div>

    <h3 class="mb-3">상태 변경</h3>

    <div class="d-flex gap-2 flex-wrap mb-3">
        <form th:action="@{/requests/{id}/status(id=${request.id})}" method="post">
            <input type="hidden" name="status" value="접수">
            <button type="submit" class="btn btn-outline-secondary">접수로 변경</button>
        </form>

        <form th:action="@{/requests/{id}/status(id=${request.id})}" method="post">
            <input type="hidden" name="status" value="진행중">
            <button type="submit" class="btn btn-outline-warning">진행중으로 변경</button>
        </form>

        <form th:action="@{/requests/{id}/status(id=${request.id})}" method="post">
            <input type="hidden" name="status" value="완료">
            <button type="submit" class="btn btn-outline-success">완료로 변경</button>
        </form>
    </div>

    <div class="d-flex gap-2 flex-wrap">
        <form th:action="@{/requests/{id}/delete(id=${request.id})}" method="post">
            <button type="submit" class="btn btn-danger">삭제하기</button>
        </form>

        <a href="/requests" class="btn btn-secondary">목록으로 돌아가기</a>
        <a href="/" class="btn btn-outline-secondary">홈으로</a>
    </div>

</div>
</body>
</html>
