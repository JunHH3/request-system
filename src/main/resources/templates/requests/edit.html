<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>요청 수정</title>
</head>
<body>

<h1>요청 수정</h1>

<form th:action="@{/requests/{id}/edit(id=${request.id})}" method="post">
    <p>
        <label>제목</label><br>
        <input type="text" name="title" th:value="${request.title}">
    </p>

    <p>
        <label>내용</label><br>
        <textarea name="content" th:text="${request.content}"></textarea>
    </p>

    <p>
        <label>작성자</label><br>
        <input type="text" name="writer" th:value="${request.writer}">
    </p>

    <button type="submit">수정 저장</button>
</form>

<hr>

<p>
    <a th:href="@{/requests/{id}(id=${request.id})}">상세로 돌아가기</a>
</p>

<p>
    <a href="/requests">목록으로 돌아가기</a>
</p>

</body>
</html>
