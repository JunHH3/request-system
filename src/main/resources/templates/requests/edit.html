<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>요청 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">

<h1>요청 수정</h1>

<form th:action="@{/requests/{id}/edit(id=${request.id})}" method="post">
    <p>
        <label>제목</label><br>
        <input type="text" name="title" th:value="${request.title}" class="form-control">
    </p>

    <p>
        <label>내용</label><br>
        <textarea name="content" th:text="${request.content}" class="form-control"></textarea>
    </p>

    <p>
        <label>작성자</label><br>
        <input type="text" name="writer" th:value="${request.writer}" class="form-control">
    </p>
<div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">수정 저장</button>
    <a th:href="@{/requests/{id}(id=${request.id})}" class="btn btn-secondary">상세로 돌아가기</a>
    <a href="/requests" class="btn btn-outline-secondary">목록으로 돌아가기</a>
</div>
</form>
</div>
</body>
</html>
