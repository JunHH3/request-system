<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>요청 목록</title>
</head>
<body>
<div class="container mt-5">

<h1>요청 목록</h1>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<p>
    <a href="/" class="btn btn-secondary">홈으로</a>
    <a href="/new" class="btn btn-primary">요청 등록</a>
</p>

<table class="table table-bordered table-hover">
    <thead>
    <tr>
        <th>번호</th>
        <th>제목</th>
        <th>내용</th>
        <th>작성자</th>
        <th>상태</th>
        <th>등록일</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="request : ${requests}">
        <td th:text="${request.id}"></td>
        <td>
            <a th:href="@{/requests/{id}(id=${request.id})}" th:text="${request.title}"></a>
        </td>
        <td th:text="${request.content}"></td>
        <td th:text="${request.writer}"></td>
        <td th:text="${request.status}"></td>
        <td th:text="${request.createdAt}"></td>
    </tr>
    </tbody>
</table>

<p th:if="${#lists.isEmpty(requests)}">등록된 요청이 없습니다.</p>
</div>
</body>
</html>
